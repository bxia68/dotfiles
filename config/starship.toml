add_newline = true
palette = 'catppuccin_mocha'
format = """
$custom\
$username\
$directory\
$git_branch\
$git_status\
$git_state\
$cmd_duration\
$line_break\
$character"""

right_format = "$jobs$status"

[palettes.catppuccin_mocha]
base = '#1e1e2e'
text = '#cdd6f4'
green = '#a6e3a1'
red = '#f38ba8'
peach = '#fab387'
blue = '#89b4fa'
mauve = '#cba6f7'
yellow = '#f9e2af'

# DOTFILES_SHELL_CONTEXT is set in ~/.zshrc.
# Change format labels or style colors here if you want a stronger distinction.
[custom.custom_context_green]
when = 'test "$DOTFILES_SHELL_CONTEXT" = custom && test "$DOTFILES_CONTEXT_COLOR" = green'
command = 'printf "%s:%s" "${DOTFILES_CONTEXT_LABEL:-CTX}" "$(hostname -s 2>/dev/null || hostname)"'
format = '[$output]($style) '
style = 'bold fg:base bg:green'

[custom.custom_context_red]
when = 'test "$DOTFILES_SHELL_CONTEXT" = custom && test "$DOTFILES_CONTEXT_COLOR" = red'
command = 'printf "%s:%s" "${DOTFILES_CONTEXT_LABEL:-CTX}" "$(hostname -s 2>/dev/null || hostname)"'
format = '[$output]($style) '
style = 'bold fg:base bg:red'

[custom.custom_context_peach]
when = 'test "$DOTFILES_SHELL_CONTEXT" = custom && test "$DOTFILES_CONTEXT_COLOR" = peach'
command = 'printf "%s:%s" "${DOTFILES_CONTEXT_LABEL:-CTX}" "$(hostname -s 2>/dev/null || hostname)"'
format = '[$output]($style) '
style = 'bold fg:base bg:peach'

[custom.custom_context_blue]
when = 'test "$DOTFILES_SHELL_CONTEXT" = custom && test "$DOTFILES_CONTEXT_COLOR" = blue'
command = 'printf "%s:%s" "${DOTFILES_CONTEXT_LABEL:-CTX}" "$(hostname -s 2>/dev/null || hostname)"'
format = '[$output]($style) '
style = 'bold fg:base bg:blue'

[custom.custom_context_mauve]
when = 'test "$DOTFILES_SHELL_CONTEXT" = custom && test "$DOTFILES_CONTEXT_COLOR" = mauve'
command = 'printf "%s:%s" "${DOTFILES_CONTEXT_LABEL:-CTX}" "$(hostname -s 2>/dev/null || hostname)"'
format = '[$output]($style) '
style = 'bold fg:base bg:mauve'

[custom.custom_context_yellow]
when = 'test "$DOTFILES_SHELL_CONTEXT" = custom && test "$DOTFILES_CONTEXT_COLOR" = yellow'
command = 'printf "%s:%s" "${DOTFILES_CONTEXT_LABEL:-CTX}" "$(hostname -s 2>/dev/null || hostname)"'
format = '[$output]($style) '
style = 'bold fg:base bg:yellow'

[custom.local_context]
when = 'test "$DOTFILES_SHELL_CONTEXT" = local && test "$(hostname -s 2>/dev/null || hostname)" != Bills-Laptop'
command = 'hostname -s 2>/dev/null || hostname'
format = '[LOCAL:$output]($style) '
style = 'bold fg:base bg:green'

[custom.remote_context]
when = 'test "$DOTFILES_SHELL_CONTEXT" = ssh'
command = 'hostname -s 2>/dev/null || hostname'
format = '[SSH:$output]($style) '
style = 'bold fg:base bg:red'

[username]
format = '[$user]($style) '
show_always = false
style_user = 'bold fg:yellow'
style_root = 'bold fg:base bg:red'

[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
truncation_length = 4
truncate_to_repo = false
read_only = ' ro'
style = 'bold fg:blue'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = 'git:'
style = 'bold fg:mauve'

[git_status]
format = '[\[$all_status$ahead_behind\]]($style) '
style = 'bold fg:red'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?'
stashed = '$'
modified = '!'
staged = '+'
renamed = '»'
deleted = '✘'

[git_state]
format = '[$state( $progress_current/$progress_total)]($style) '
style = 'bold fg:yellow'

[cmd_duration]
min_time = 1000
format = '[took $duration]($style) '
style = 'fg:yellow'

[status]
disabled = false
format = '[exit $status]($style) '
style = 'bold fg:red'

[character]
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_symbol = '[❮](bold fg:red)'
vimcmd_visual_symbol = '[❮](bold fg:mauve)'
